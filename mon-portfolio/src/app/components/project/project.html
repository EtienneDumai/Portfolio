<section id="projets" class="w-full px-6 py-20 bg-surface">
  <div class="mx-auto max-w-5xl">

    <!-- Section header -->
    <div class="mb-12">
      <p class="text-xs font-semibold tracking-widest uppercase text-accent mb-2">Réalisations</p>
      <h2 class="text-3xl font-bold text-ink">Mes projets</h2>
      <div class="section-divider mt-3"></div>
      <p class="text-sm text-dim mt-3 max-w-lg">
        Projets que j'ai eu la chance de réaliser — scolaires, personnels, ou en équipe.
      </p>
    </div>

    <!-- Grid -->
    @if (this.listProjet.length !== 0) {
      <div class="grid gap-6 sm:grid-cols-1 lg:grid-cols-2 xl:grid-cols-3">
        @for (projet of this.listProjet; track projet.id) {
          <app-project-card
            [id]="projet.id"
            [nom]="projet.nom"
            [description]="projet.description"
            [date_debut]="projet.date_debut"
            [date_fin]="projet.date_fin"
            [status]="projet.status"
            [type]="projet.type"
            [stack]="projet.stack"
            [roles]="projet.roles"
            [imageUrl]="projet.imageUrl"
            [lienGithub]="projet.lienGithub"
            [lienDemo]="projet.lienDemo"
          />
        }
      </div>
    }

  </div>
</section>
